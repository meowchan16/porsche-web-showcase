<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Porsche 718</title>
  <link rel="stylesheet" href="hh.css">

  <style>
    body {
      background: #000;
      color: #B0E4CC;
      margin: 0;
      font-family: Arial, sans-serif;

      /* PAGE TRANSITION */
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    /* SLIDE OUT */
    body.slide-out {
      opacity: 0;
      transform: translateX(80px);
    }

    /* BACK BUTTON */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;

      width: 42px;
      height: 42px;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 18px;

      border: 1px solid rgba(176, 228, 204, 0.4);
      border-radius: 50%;

      background: rgba(9, 20, 19, 0.9);
      backdrop-filter: blur(10px);

      color: #B0E4CC;
      cursor: pointer;

      z-index: 9999;
      box-shadow: 0 0 12px rgba(176, 228, 204, 0.3);

      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: #285A48;
      border-color: #285A48;
      color: white;
      transform: translateY(-3px) scale(1.08);
      box-shadow: 0 0 20px rgba(40, 90, 72, 0.8);
    }

    /* GRID */
    .cars-container {
      display: flex;
      height: 100vh;
    }

    .car-option {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s ease;
      z-index: 1;
    }

    .car-option img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.4s ease;
    }

    .car-text {
      position: absolute;
      bottom: 40px;
      left: 30px;
      font-size: 24px;
      font-weight: bold;
      z-index: 2;
      transition: 0.3s ease;
    }

    .car-option::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      transition: 0.4s ease;
    }

    /* HOVER */
    .car-option:hover {
      flex: 1.3;
    }

    .car-option:hover img {
      transform: scale(1.06);
    }

    .car-option:hover .car-text {
      transform: translateY(-5px);
    }

    .car-option:hover::after {
      background: rgba(0,0,0,0.2);
      box-shadow: inset 0 0 50px #285A48;
    }

  </style>
</head>

<body>

  <button class="back-btn" onclick="goBack()">←</button>

  <div class="cars-container">

    <div class="car-option" onclick="goToPage('cyman718.html')">
      <img src="cyman.jpg" alt="718 Cayman">
      <div class="car-text">718 Cayman</div>
    </div>

    <div class="car-option" onclick="goToPage('boxer.html')">
      <img src="boxer.jpg" alt="718 Boxster">
      <div class="car-text">718 Boxster</div>
    </div>

    <div class="car-option" onclick="goToPage('gt4rs.html')">
      <img src="gt4rs.jpg" alt="718 Cayman GT4 RS">
      <div class="car-text">718 Cayman GT4 RS</div>
    </div>

    <div class="car-option" onclick="goToPage('spyder.html')">
      <img src="spyderii.png" alt="718 Spyder">
      <div class="car-text">718 Spyder</div>
    </div>

  </div>

  <script>
    // Handles the back button navigation
    function goBack() {
      document.body.classList.add("slide-out");
      setTimeout(() => {
        window.location.href = "index.html";
      }, 400); 
    }

    // Handles the navigation when a car is clicked
    function goToPage(url) {
      document.body.classList.add("slide-out");
      setTimeout(() => {
        window.location.href = url;
      }, 400);
    }
  </script>

</body>
</html>
