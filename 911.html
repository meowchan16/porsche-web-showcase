<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Porsche 911 Series</title>
  <link rel="stylesheet" href="hh.css">

  <style>
    body {
      background: #000;
      color: #B0E4CC;
      margin: 0;
      font-family: Arial, sans-serif;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    /* SLIDE OUT EFFECT */
    body.slide-out {
      opacity: 0;
      transform: translateX(80px);
    }

    /* BACK BUTTON */
    .back-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border: 1px solid rgba(176, 228, 204, 0.4);
      border-radius: 50%;
      background: rgba(9, 20, 19, 0.9);
      backdrop-filter: blur(10px);
      color: #B0E4CC;
      cursor: pointer;
      z-index: 9999;
      box-shadow: 0 0 12px rgba(176, 228, 204, 0.3);
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: #285A48;
      border-color: #285A48;
      color: white;
      transform: translateY(-3px) scale(1.08);
      box-shadow: 0 0 20px rgba(40, 90, 72, 0.8);
    }

    /* GRID CONTAINER */
    .cars-container {
      display: flex;
      height: 100vh;
    }

    .car-option {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s ease;
      z-index: 1;
    }

    .car-option img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: 0.4s ease;
    }

    .car-text {
      position: absolute;
      bottom: 40px;
      left: 30px;
      font-size: 24px;
      font-weight: bold;
      z-index: 2;
      transition: 0.3s ease;
    }

    .car-option::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
      transition: 0.4s ease;
    }

    /* HOVER INTERACTION */
    .car-option:hover {
      flex: 1.5; /* Slightly more expansion for the 911s */
    }

    .car-option:hover img {
      transform: scale(1.1);
    }

    .car-option:hover .car-text {
      transform: translateY(-5px);
      color: #fff;
    }

    .car-option:hover::after {
      background: rgba(0,0,0,0.1);
      box-shadow: inset 0 0 80px rgba(40, 90, 72, 0.6);
    }

  </style>
</head>

<body>

  <button class="back-btn" onclick="goBack()">←</button>

  <div class="cars-container">

    <div class="car-option" onclick="goToPage('911turbo.html')">
      <img src="turbo911.png" alt="911 Turbo S">
      <div class="car-text">911 Turbo S</div>
    </div>

    <div class="car-option" onclick="goToPage('911gt3rs.html')">
      <img src="gt3rs.png" alt="911 GT3 RS">
      <div class="car-text">911 GT3 RS</div>
    </div>

    <div class="car-option" onclick="goToPage('911gt3.html')">
      <img src="gt3.png" alt="911 GT3">
      <div class="car-text">911 GT3</div>
    </div>

    <div class="car-option" onclick="goToPage('911targa.html')">
      <img src="traga911.jpg" alt="911 Targa 4">
      <div class="car-text">911 Targa 4</div>
    </div>

  </div>

  <script>
    function goBack() {
      document.body.classList.add("slide-out");
      setTimeout(() => {
        window.location.href = "index.html";
      }, 400); 
    }

    function goToPage(url) {
      document.body.classList.add("slide-out");
      setTimeout(() => {
        window.location.href = url;
      }, 400);
    }
  </script>

</body>
</html>
