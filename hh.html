<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Porsche</title>
  <link rel="stylesheet" href="hh.css">
</head>
<body>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="menu">☰ Menu</div>
    <div class="logo">PORSCHE</div>
    <div class="profile">👤</div>
  </header>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

    <!-- TOP CONTROLS -->
    <div class="sidebar-top">
      <div class="back-btn" id="menuBack">⬅</div>
      <div class="close-btn" id="closeBtn">✕</div>
    </div>

    <!-- LEFT -->
    <div class="sidebar-left">
      <div class="menu-item active">Models</div>
      <div class="menu-item">Electric</div>
      <div class="menu-item">Vehicle Purchase</div>
      <div class="menu-item">Services</div>f
      <div class="menu-item">Experience</div>
      <div class="menu-item">Find a Dealer</div>

      <div class="account">👤 Account</div>
    </div>

    <!-- RIGHT -->
    <div class="sidebar-right">

      <div class="car" data-link="718.html">
        <h2>718</h2>
        <video autoplay muted loop playsinline>
          <source src="hello.mp4" type="video/mp4">
        </video>
        <span>Gasoline</span>
      </div>

      <div class="car" data-link="911.html">
        <h2>911</h2>
        <video autoplay muted loop playsinline>
          <source src="hello1.mp4" type="video/mp4">
        </video>
        <span>Gasoline</span>
      </div>

      <div class="car" data-link="taycan.html">
        <h2>Taycan</h2>
        <video autoplay muted loop playsinline>
          <source src="hello2.mp4" type="video/mp4">
        </video>
        <span>Electric</span>
      </div>

      <div class="car" data-link="panamera.html">
        <h2>Panamera</h2>
        <video autoplay muted loop playsinline>
          <source src="hello3.mp4" type="video/mp4">
        </video>
        <span>Hybrid / Gasoline</span>
      </div>

      <div class="car" data-link="macan.html">
        <h2>Macan</h2>
        <video autoplay muted loop playsinline>
          <source src="hello.mp4" type="video/mp4">
        </video>
        <span>Electric</span>
      </div>
      <div class="car" data-link="taycan.html">
        <h2>Electric</h2>
        <video autoplay muted loop playsinline>
          <source src="hello2.mp4" type="video/mp4">
        </video>
        <span>Electric , Hybrid, Gasoline</span>
      </div>

    </div>
  </div>

  <!-- HERO -->
  <section class="hero">

    <video autoplay muted loop playsinline class="bg-video">
      <source src="frontpicture.mov" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="hero-content">
      <h1>Macan<br>Electric.</h1>
      <button class="outline-btn">Discover more</button>
    </div>

    <div class="scroll-down">↓</div>

  </section>

  <footer>
    <p>© 2026 Porsche Clone</p>
  </footer>

  <script src="hh.js"></script>

</body>
</html>
